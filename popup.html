<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Price Breakdown</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icon128.png" class="header-logo" alt="Booking Breakdown logo" width="24" height="24">
    <h1>Booking Breakdown</h1>
  </div>
  <p class="description">
    Personaliza qué desgloses deseas ver en la página de Booking:
  </p>
  <div class="option-list">
    <div class="option-item">
      <span class="option-label">💰 Precio total</span>
      <label class="switch" aria-label="Mostrar precio total">
        <input type="checkbox" id="showTotal">
        <span class="slider"></span>
      </label>
    </div>
    <div class="option-item">
      <span class="option-label">👥 Por persona</span>
      <label class="switch" aria-label="Mostrar precio por persona">
        <input type="checkbox" id="showPerPerson">
        <span class="slider"></span>
      </label>
    </div>
    <div class="option-item">
      <span class="option-label">🌙 Por noche</span>
      <label class="switch" aria-label="Mostrar precio por noche">
        <input type="checkbox" id="showPerNight">
        <span class="slider"></span>
      </label>
    </div>
    <div class="option-item">
      <span class="option-label">✨ Por noche y persona</span>
      <label class="switch" aria-label="Mostrar precio por noche y persona">
        <input type="checkbox" id="showPerNightPerPerson">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <footer class="footer">
    Los cambios se aplican automáticamente en tiempo real.
  </footer>
  <script src="browser-polyfill.min.js"></script>
  <script src="popup.js"></script>

</body>
</html>
